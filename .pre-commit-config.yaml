ci:
    autoupdate_schedule: 'weekly'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: .bumpversion.cfg
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
    -   id: pyupgrade
        args: [--py36-plus]
        language_version: python3.12
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        files: ^.*\.(py|md|yaml|js|ts|ipynb)$
        args: ["--skip=**/solara_portal/**"]
        additional_dependencies:
          - tomli
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.11
    hooks:
      - id: ruff
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        name: mypy (ipyvuetify 1)
        pass_filenames: false
        args: [--explicit-package-bases, .]
        additional_dependencies: [types-requests, types-markdown, types-PyYAML, types-filelock, types-cachetools, types-redis, types-python-dateutil, types-pycurl, "reacton @ git+https://github.com/widgetti/reacton.git@6526c42f458f95e5125356ec09cde8411646d899", types-six, types-decorator, ipython, ipykernel]
      - id: mypy
        name: mypy (ipyvuetify 3)
        pass_filenames: false
        args: [--config-file=mypy-v3.ini, --explicit-package-bases, .]
        additional_dependencies: [types-requests, types-markdown, types-PyYAML, types-filelock, types-cachetools, types-redis, types-python-dateutil, types-pycurl, "reacton @ git+https://github.com/widgetti/reacton.git@6526c42f458f95e5125356ec09cde8411646d899", ipyvue==3.0.0a8, ipyvuetify==3.0.0a4, types-six, types-decorator, ipython, ipykernel]
